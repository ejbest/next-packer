name: Register Machines in MAAS

# Run this ONCE when setting up new hardware or after wiping MAAS.
# Registers blue and green HP servers in their respective MAAS instances,
# sets power webhooks (smart-plug-maas plugB/plugA), assigns static IPs,
# and waits for commissioning to complete.
#
# After this runs successfully, NEVER run it again unless hardware changes.
# The 1of3 pipeline (next-base-baremetal) handles deploy/release from here on.

on:
  workflow_dispatch:
    inputs:
      environment:
        description: 'Which machine(s) to register'
        required: true
        type: choice
        options: [blue, green, both]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: 'true'

jobs:
  register:
    name: Register ${{ github.event.inputs.environment }} in MAAS
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4.2.2

      - name: Vault Login (AppRole)
        run: |
          TOKEN=$(vault write -field=token auth/approle/login \
            role_id="$VAULT_ROLE_ID" secret_id="$VAULT_SECRET_ID")
          echo "VAULT_TOKEN=$TOKEN" >> $GITHUB_ENV

      - name: Load AWS credentials from Vault
        run: |
          AWS_KEY=$(vault read -field=AWS_ACCESS_KEY ejbest/terraform/s3_creds)
          AWS_SECRET=$(vault read -field=AWS_SECRET_KEY ejbest/terraform/s3_creds)
          echo "AWS_ACCESS_KEY_ID=$AWS_KEY" >> $GITHUB_ENV
          echo "AWS_SECRET_ACCESS_KEY=$AWS_SECRET" >> $GITHUB_ENV
          echo "AWS_DEFAULT_REGION=us-east-1" >> $GITHUB_ENV

      - name: Load MAAS credentials from Vault
        run: |
          echo "TF_VAR_blue_maas_api_key=$(vault kv get -field=maas_api_key tracker-db/next-base-baremetal)" >> $GITHUB_ENV
          echo "TF_VAR_green_maas_api_key=$(vault kv get -field=green_maas_api_key tracker-db/next-base-baremetal)" >> $GITHUB_ENV

      - name: Terraform Init
        run: terraform -chdir=terraform init -input=false -no-color

      - name: Terraform Apply — Register & Commission
        run: |
          ENV="${{ github.event.inputs.environment }}"
          if [ "$ENV" = "blue" ]; then
            TARGETS="-target=maas_machine.blue -target=maas_network_interface_link.blue_pxe"
          elif [ "$ENV" = "green" ]; then
            TARGETS="-target=maas_machine.green -target=maas_network_interface_link.green_pxe"
          else
            TARGETS=""
          fi
          terraform -chdir=terraform apply $TARGETS -auto-approve -input=false -no-color
          echo "Machine(s) registered and commissioned. Ready for 1of3 deploy pipeline."
